<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <title>Tests — Finance Dashboard</title>
  <style>
    :root { color-scheme: light only; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      max-width: 900px; margin: 24px auto; padding: 0 16px;
      background: #FFF8F5; color: #231A11;
    }
    h1 { font-family: 'Noto Serif', Georgia, serif; margin: 0 0 4px; }
    .meta { color: #534346; font-size: 0.85rem; margin-bottom: 24px; }
    .suite {
      background: #fff; border: 1px solid #D7C1C5; border-radius: 12px;
      margin-bottom: 16px; overflow: hidden;
    }
    .suite-head {
      padding: 12px 16px; font-weight: 700; display: flex;
      justify-content: space-between; align-items: center;
      border-bottom: 1px solid #F2DFD0;
    }
    .test {
      padding: 8px 16px; font-size: 0.9rem; font-family: ui-monospace, monospace;
      border-bottom: 1px solid #F8E5D6; display: flex; gap: 10px;
    }
    .test:last-child { border-bottom: none; }
    .test.pass { color: #2D6A4F; }
    .test.fail { color: #BA1A1A; background: #FFDAD6; }
    .test-status { width: 18px; text-align: center; }
    .test-msg { flex: 1; white-space: pre-wrap; }
    .summary {
      position: sticky; top: 0; background: #FFF8F5; padding: 12px 0;
      font-weight: 700; font-size: 1.1rem;
    }
    .summary.pass { color: #2D6A4F; }
    .summary.fail { color: #BA1A1A; }
  </style>
</head>
<body>
  <h1>Test Runner</h1>
  <div class="meta">Lokaler Test-Runner für matcher.js / owners.js. Browser öffnen, fertig.</div>
  <div class="summary" id="summary">Lade Tests…</div>
  <div id="results"></div>

  <script type="module">
    import './matcher.test.js';
    import './owners.test.js';
    import { runAll } from './harness.js';
    runAll();
  </script>
</body>
</html>
